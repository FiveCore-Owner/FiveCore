<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Hotbar (always visible at bottom, 5 slots) ── -->
<div id="hotbar">
    <div class="hotbar-slot" data-slot="46" data-hotbar="1">
        <span class="hotbar-key">1</span>
        <div class="slot-inner"></div>
    </div>
    <div class="hotbar-slot" data-slot="47" data-hotbar="2">
        <span class="hotbar-key">2</span>
        <div class="slot-inner"></div>
    </div>
    <div class="hotbar-slot" data-slot="48" data-hotbar="3">
        <span class="hotbar-key">3</span>
        <div class="slot-inner"></div>
    </div>
    <div class="hotbar-slot" data-slot="49" data-hotbar="4">
        <span class="hotbar-key">4</span>
        <div class="slot-inner"></div>
    </div>
    <div class="hotbar-slot" data-slot="50" data-hotbar="5">
        <span class="hotbar-key">5</span>
        <div class="slot-inner"></div>
    </div>
</div>

<!-- ── Full Inventory (F2) ── -->
<div id="inv-overlay" style="display:none">
    <div id="inv-panel">

        <div id="inv-header">
            <span id="inv-title" data-i18n="inv_title">INVENTORY</span>
            <button id="inv-close" data-i18n="inv_close">&#10005;</button>
        </div>

        <!-- Main 45-slot grid -->
        <div id="inv-grid">
            <!-- Slots 1-45 generated by JS -->
        </div>

        <!-- Hotbar row (slots 46-50) inside the full view -->
        <div id="inv-hotbar-section">
            <div class="inv-section-label" data-i18n="inv_hotbar">HOTBAR</div>
            <div id="inv-hotbar-grid">
                <!-- Slots 46-50 generated by JS -->
            </div>
        </div>

    </div>
</div>

<script src="app.js"></script>
</body>
</html>
