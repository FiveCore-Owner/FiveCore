<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FiveCore — Character</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" style="display:none">

    <!-- ═══ SPRACH-AUSWAHL ════════════════════════════════════════════════════ -->
    <div id="screen-lang" class="screen" style="display:none">
        <div class="screen-title">Select Language</div>
        <div id="lang-list" class="lang-list"></div>
    </div>

    <!-- ═══ CHARAKTER-AUSWAHL ════════════════════════════════════════════════ -->
    <div id="screen-select" class="screen" style="display:none">
        <div class="screen-title" data-i18n="cc_title">Select Character</div>
        <div id="char-list" class="char-list"></div>
        <button class="btn-primary" id="btn-new-char" data-i18n="cc_new_char">+ Create new character</button>
    </div>

    <!-- ═══ CHARAKTER-ERSTELLEN ══════════════════════════════════════════════ -->
    <div id="screen-create" class="screen" style="display:none">

        <!-- Gender-Toggle -->
        <div class="gender-row">
            <button class="gender-btn active" data-gender="0" id="btn-male" data-i18n="cc_male">♂ Male</button>
            <button class="gender-btn" data-gender="1" id="btn-female" data-i18n="cc_female">♀ Female</button>
        </div>

        <!-- Kamera-Presets -->
        <div class="cam-row">
            <button class="cam-btn active" data-cam="full" data-i18n="cc_cam_full">Full</button>
            <button class="cam-btn" data-cam="torso" data-i18n="cc_cam_torso">Torso</button>
            <button class="cam-btn" data-cam="face" data-i18n="cc_cam_face">Face</button>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="heritage" data-i18n="cc_tab_heritage">Heritage</button>
            <button class="tab" data-tab="face" data-i18n="cc_tab_face">Face</button>
            <button class="tab" data-tab="hair" data-i18n="cc_tab_hair">Hair</button>
            <button class="tab" data-tab="overlays" data-i18n="cc_tab_overlays">Overlays</button>
            <button class="tab" data-tab="eyes" data-i18n="cc_tab_eyes">Eyes</button>
            <button class="tab" data-tab="info" data-i18n="cc_tab_info">Info</button>
        </div>

        <!-- Tab: Herkunft -->
        <div id="tab-heritage" class="tab-content active">
            <div class="section-title" data-i18n="cc_mother">Mother</div>
            <div class="row-label"><span data-i18n="cc_mother">Mother</span>
                <input type="range" min="0" max="44" step="1" value="0" id="sl-mother">
                <span id="val-mother">0</span>
            </div>
            <div class="row-label"><span data-i18n="cc_father">Father</span>
                <input type="range" min="0" max="44" step="1" value="0" id="sl-father">
                <span id="val-father">0</span>
            </div>
            <div class="row-label"><span data-i18n="cc_resemblance">Resemblance</span>
                <input type="range" min="0" max="100" step="1" value="50" id="sl-resemblance">
                <span id="val-resemblance">0.50</span>
            </div>
            <div class="row-label"><span data-i18n="cc_skintone">Skin Tone</span>
                <input type="range" min="0" max="100" step="1" value="50" id="sl-skintone">
                <span id="val-skintone">0.50</span>
            </div>
        </div>

        <!-- Tab: Face Features -->
        <div id="tab-face" class="tab-content">
            <div class="section-title" data-i18n="cc_face_morphs">Face Morphs</div>
            <div id="face-features-list"></div>
        </div>

        <!-- Tab: Hair -->
        <div id="tab-hair" class="tab-content">
            <div class="section-title" data-i18n="cc_hair_style">Style</div>
            <div class="row-label"><span data-i18n="cc_hair_style">Style</span>
                <input type="range" min="0" max="73" step="1" value="0" id="sl-hair-style">
                <span id="val-hair-style">0</span>
            </div>
            <div class="row-label"><span data-i18n="cc_hair_color">Color</span>
                <input type="range" min="0" max="63" step="1" value="0" id="sl-hair-color">
                <span id="val-hair-color">0</span>
            </div>
            <div class="row-label"><span data-i18n="cc_hair_highlight">Highlight</span>
                <input type="range" min="0" max="63" step="1" value="0" id="sl-hair-highlight">
                <span id="val-hair-highlight">0</span>
            </div>
        </div>

        <!-- Tab: Overlays -->
        <div id="tab-overlays" class="tab-content">
            <div class="section-title" data-i18n="cc_tab_overlays">Overlays</div>
            <div id="overlay-list"></div>
        </div>

        <!-- Tab: Eyes -->
        <div id="tab-eyes" class="tab-content">
            <div class="section-title" data-i18n="cc_eye_color">Eye Color</div>
            <div class="row-label"><span data-i18n="cc_eye_color">Color</span>
                <input type="range" min="0" max="30" step="1" value="0" id="sl-eyecolor">
                <span id="val-eyecolor">0</span>
            </div>
        </div>

        <!-- Tab: Info -->
        <div id="tab-info" class="tab-content">
            <div class="section-title" data-i18n="cc_char_info">Character Info</div>
            <label class="field-label">
                <span data-i18n="cc_firstname">First Name</span>
                <input type="text" id="inp-firstname" data-i18n-placeholder="cc_firstname" placeholder="First Name" maxlength="30">
            </label>
            <label class="field-label">
                <span data-i18n="cc_lastname">Last Name</span>
                <input type="text" id="inp-lastname" data-i18n-placeholder="cc_lastname" placeholder="Last Name" maxlength="30">
            </label>
            <label class="field-label">
                <span data-i18n="cc_birthday">Birthday (DD/MM/YYYY)</span>
                <input type="text" id="inp-dob" data-i18n-placeholder="cc_birthday" placeholder="01/01/1990" maxlength="10">
            </label>
            <div id="info-error" class="error-msg" style="display:none"></div>
        </div>

        <!-- Aktions-Buttons -->
        <div class="action-row">
            <button class="btn-secondary" id="btn-randomize" data-i18n="cc_randomize">Randomize</button>
            <button class="btn-secondary" id="btn-back" data-i18n="cc_back">Back</button>
            <button class="btn-primary" id="btn-create" data-i18n="cc_create">Create Character</button>
        </div>
    </div>

</div>
<script src="app.js"></script>
</body>
</html>
