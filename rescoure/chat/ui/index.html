<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="chat-wrap">
    <div id="chat-log" class="chat-log"></div>
    <div id="chat-input-row" class="chat-input-row" style="display:none">
        <div class="mode-tabs">
            <button class="mode-btn active" data-mode="local" data-i18n="chat_mode_local">LOCAL</button>
            <button class="mode-btn" data-mode="ooc" data-i18n="chat_mode_ooc">OOC</button>
            <button class="mode-btn" data-mode="me" data-i18n="chat_mode_me">/ME</button>
        </div>
        <input type="text" id="chat-input" data-i18n-placeholder="chat_placeholder" placeholder="Type a message..." autocomplete="off" maxlength="200">
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
