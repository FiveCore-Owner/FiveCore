<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="phone" style="display:none">
    <div class="phone-frame">
        <div class="statusbar">
            <span id="phone-time">12:00</span>
            <span data-i18n="phone_signal">📶 4G</span>
        </div>
        <div class="phone-tabs">
            <button class="ptab active" data-tab="inbox" data-i18n="phone_tab_inbox">Inbox</button>
            <button class="ptab" data-tab="outbox" data-i18n="phone_tab_outbox">Outbox</button>
            <button class="ptab" data-tab="compose" data-i18n="phone_tab_compose">Compose</button>
        </div>

        <!-- Inbox -->
        <div id="ptab-inbox" class="ptab-content active">
            <div class="my-number-row">
                <span data-i18n="phone_my_number">My number: </span><span id="my-phone-display">???</span>
            </div>
            <div id="inbox-list" class="msg-list">
                <div class="empty-msg" data-i18n="phone_empty_inbox">No messages</div>
            </div>
        </div>

        <!-- Outbox -->
        <div id="ptab-outbox" class="ptab-content">
            <div id="outbox-list" class="msg-list">
                <div class="empty-msg" data-i18n="phone_empty_outbox">No sent messages</div>
            </div>
        </div>

        <!-- Compose -->
        <div id="ptab-compose" class="ptab-content">
            <div class="compose-form">
                <label class="comp-label">
                    <span data-i18n="phone_to">To (Number):</span>
                    <input type="text" id="comp-to" data-i18n-placeholder="phone_to_placeholder" placeholder="555-1234" maxlength="20">
                </label>
                <label class="comp-label">
                    <span data-i18n="phone_message">Message:</span>
                    <textarea id="comp-msg" data-i18n-placeholder="phone_message_placeholder" placeholder="Message..." maxlength="200" rows="4"></textarea>
                </label>
                <div id="comp-counter" class="char-counter">0 / 200</div>
                <div id="comp-error" class="comp-error" style="display:none"></div>
                <button id="btn-send-sms" class="btn-send" data-i18n="phone_send">📤 Send</button>
            </div>
        </div>

        <button class="phone-close" id="btn-close-phone">✕</button>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
